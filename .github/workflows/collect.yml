name: RAC Price Collection

# ──────────────────────────────────────────────────────────────────────────────
# Coleta automática de preços de ar condicionado em marketplaces e dealers.
#
# Schedules (horário de Brasília = UTC-3):
#   • 08:00 BRT (11:00 UTC) todos os dias  →  coleta manhã  — alta + media, 2 páginas
#   • 18:00 BRT (21:00 UTC) todos os dias  →  coleta tarde  — apenas alta,  1 página
#
# Arquitetura de coleta:
#   Python  →  ML, Google Shopping, Amazon, Leroy Merlin, Dealers (Playwright)
#   Node.js →  Magalu (Puppeteer-stealth, bypass Akamai Bot Manager)
#
# Variáveis obrigatórias (Settings → Secrets and variables → Actions):
#   SUPABASE_URL   —  URL do projeto Supabase
#   SUPABASE_KEY   —  chave de serviço (service_role) ou anon key com insert
# ──────────────────────────────────────────────────────────────────────────────

on:
  # Coleta principal centralizada na Oracle Cloud VM (cron via SSH).
  # GitHub Actions cobre:
  #   • ML (bloqueado por IP no Oracle VM — Azure IPs não são bloqueados)
  #   • Backup manual de todas as plataformas
  schedule:
    # ML via GitHub Actions: 09:00 BRT (12:00 UTC) e 20:00 BRT (23:00 UTC)
    - cron: '0 12 * * *'   # manhã
    - cron: '0 23 * * *'   # noite
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Plataformas Python separadas por espaço'
        required: false
        default: 'ml google_shopping amazon leroy dealers'
      node_platforms:
        description: 'Plataformas Node.js separadas por vírgula (magalu,shopee)'
        required: false
        default: 'magalu'
      pages:
        description: 'Páginas por keyword (1–5)'
        required: false
        default: '2'
      priority:
        description: 'Prioridade das keywords (alta, media, baixa ou vazio = todas)'
        required: false
        default: ''
      skip_nodejs:
        description: 'Pular Node.js Magalu (true/false)'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  TZ: America/Sao_Paulo

jobs:
  collect:
    name: Coleta de Preços RAC
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5 h — suficiente para varredura completa

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      # ── 3. Node.js ─────────────────────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: magalu_shopee/package-lock.json

      # ── 4. Dependências Python ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      # ── 5. Dependências Node.js ────────────────────────────────────────────
      - name: Install Node.js dependencies (magalu_shopee)
        run: cd magalu_shopee && npm ci --silent

      # ── 6. Playwright browsers + system dependencies ──────────────────────
      # install-deps: bibliotecas de sistema (libglib2, libnss3, etc.)
      # install chromium: baixa o binário do Chromium para ~/.cache/ms-playwright
      # google-chrome-stable está pré-instalado no runner e é usado como channel="chrome"
      - name: Install Playwright browsers and system dependencies
        run: |
          playwright install-deps chromium
          playwright install chromium
          google-chrome --version || true

      # ── 7. Determina parâmetros de execução ────────────────────────────────
      - name: Resolve run parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "platforms=${{ github.event.inputs.platforms }}"           >> "$GITHUB_OUTPUT"
            echo "node_platforms=${{ github.event.inputs.node_platforms }}" >> "$GITHUB_OUTPUT"
            echo "pages=${{ github.event.inputs.pages }}"                   >> "$GITHUB_OUTPUT"
            echo "skip_nodejs=${{ github.event.inputs.skip_nodejs }}"       >> "$GITHUB_OUTPUT"
            PRIO="${{ github.event.inputs.priority }}"
            echo "priority=${PRIO}"                                         >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            # 09:00 BRT — ML manhã (Oracle VM bloqueado por IP)
            echo "platforms=ml"       >> "$GITHUB_OUTPUT"
            echo "node_platforms="    >> "$GITHUB_OUTPUT"
            echo "pages=2"            >> "$GITHUB_OUTPUT"
            echo "priority=alta media" >> "$GITHUB_OUTPUT"
            echo "skip_nodejs=true"   >> "$GITHUB_OUTPUT"
          else
            # 20:00 BRT — ML noite
            echo "platforms=ml"       >> "$GITHUB_OUTPUT"
            echo "node_platforms="    >> "$GITHUB_OUTPUT"
            echo "pages=1"            >> "$GITHUB_OUTPUT"
            echo "priority=alta"      >> "$GITHUB_OUTPUT"
            echo "skip_nodejs=true"   >> "$GITHUB_OUTPUT"
          fi

      # ── 8. Xvfb — display virtual para MLScraper (headless=False) ───────────
      - name: Start Xvfb virtual display
        run: |
          sudo apt-get install -y xvfb --quiet
          Xvfb :99 -screen 0 1366x768x24 -nolisten tcp &
          sleep 1
          echo "Xvfb iniciado (PID=$!)"

      # ── 9. Executa coleta Python ───────────────────────────────────────────
      - name: Run Python collector
        env:
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          ML_APP_ID:      ${{ secrets.ML_APP_ID }}
          ML_APP_SECRET:  ${{ secrets.ML_APP_SECRET }}
          CI: 'true'
          DISPLAY: ':99'
        run: |
          PLATFORMS="${{ steps.params.outputs.platforms }}"
          PAGES="${{ steps.params.outputs.pages }}"
          PRIORITY="${{ steps.params.outputs.priority }}"

          CMD="python main.py --platforms $PLATFORMS --pages $PAGES"
          if [ -n "$PRIORITY" ]; then
            CMD="$CMD --priority $PRIORITY"
          fi

          echo "Executando: $CMD"
          eval "$CMD"

      # ── 10. Executa coleta Node.js (Magalu) ───────────────────────────────
      - name: Run Node.js collector (Magalu)
        if: steps.params.outputs.skip_nodejs != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CI: 'true'
        run: |
          NODE_PLATFORMS="${{ steps.params.outputs.node_platforms }}"
          PAGES="${{ steps.params.outputs.pages }}"

          echo "Executando Node.js: --platforms $NODE_PLATFORMS --pages $PAGES"
          cd magalu_shopee
          node node_modules/.bin/ts-node src/index.ts \
            --platforms "$NODE_PLATFORMS" \
            --pages "$PAGES"

      # ── 10. Salva CSVs como artefato ───────────────────────────────────────
      - name: Upload CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rac-coleta-${{ github.run_id }}
          path: |
            output/*.csv
            magalu_shopee/data/*.csv
          retention-days: 30
          if-no-files-found: warn

      # ── 11. Salva logs ─────────────────────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rac-logs-${{ github.run_id }}
          path: |
            logs/*.log
            logs/dealer_debug_*.html
          retention-days: 7
          if-no-files-found: ignore
